<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>起來動一動</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c1810; --card:#152319; --card-alt:#1d3226;
  --accent:#ff7043; --accent2:#ffab91;
  --green:#66bb6a; --green-light:#a5d6a7; --green-dark:#2e7d32;
  --gold:#ffd54f; --yellow:#ffca28; --red:#ef5350;
  --blue:#42a5f5; --blue-light:#90caf9; --blue-dark:#1565c0;
  --pink:#f48fb1; --pink-light:#f8bbd0;
  --grey:#78909c; --grey-dark:#455a64;
  --text:#e8f5e9; --text-dim:#7da57d;
  --radius:14px;
  --top-h:50px;
  --tab-h:56px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Noto Sans TC','Fredoka',sans-serif;background:var(--bg);color:var(--text);font-size:16px;-webkit-tap-highlight-color:transparent;}

/* ========== TOP BAR ========== */
.topbar{position:fixed;top:0;left:0;right:0;z-index:50;height:var(--top-h);background:#0c1810ee;backdrop-filter:blur(8px);border-bottom:1px solid #ffffff08;display:flex;align-items:center;padding:0 10px;gap:6px;}
.tb-title{font-family:'Fredoka',sans-serif;font-size:1rem;font-weight:700;color:var(--green-light);margin-right:auto;white-space:nowrap;}
.tb-chip{background:var(--card);border-radius:8px;padding:4px 7px;font-size:.7rem;color:var(--text-dim);display:flex;align-items:center;gap:3px;white-space:nowrap;}
.tb-chip .v{font-family:'Fredoka',sans-serif;font-weight:700;font-size:.8rem;color:var(--gold);}
.tb-chip .v.on{color:var(--green-light);}
.tb-chip .v.off{color:var(--grey);}
.tb-chip .v.done{color:var(--green);}
.tb-chip .v.warn{color:var(--red);}
.tb-login{background:var(--card-alt);border:1px solid #ffffff20;color:var(--text-dim);padding:4px 8px;border-radius:8px;font-size:.65rem;font-family:inherit;cursor:pointer;white-space:nowrap;}
.tb-login.on{border-color:var(--green);color:var(--green-light);}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:3px;}
.dot.on{background:var(--green);} .dot.off{background:var(--grey);}
.tb-btn{background:none;border:none;font-size:1rem;cursor:pointer;padding:2px;position:relative;}
.tb-btn .notif-dot{position:absolute;top:0;right:0;width:7px;height:7px;border-radius:50%;background:var(--red);}
.tb-btn .notif-dot.hide{display:none;}

@media(max-width:430px){
  .tb-title{display:none;}
  .tb-chip{font-size:.65rem;padding:3px 5px;}
  .tb-chip .v{font-size:.72rem;}
  .tb-login{font-size:.6rem;}
}

/* ========== MAIN ========== */
.main{padding-top:var(--top-h);padding-bottom:var(--tab-h);min-height:100dvh;}

/* ========== TABS (mobile) ========== */
.tabs{position:fixed;bottom:0;left:0;right:0;z-index:50;height:var(--tab-h);background:#0c1810f2;backdrop-filter:blur(8px);border-top:1px solid #ffffff10;display:flex;padding-bottom:env(safe-area-inset-bottom,0);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-dim);cursor:pointer;transition:color .2s;gap:1px;}
.tab.active{color:var(--green-light);}
.tab .ti{font-size:1.25rem;line-height:1;}
.tab .tl{font-size:.62rem;font-weight:700;}
.tab .tb{font-size:.55rem;color:var(--gold);min-height:.7em;}

/* ========== VIEWS ========== */
.views{padding:10px;}
.view{display:none;}
.view.active{display:block;}

/* ========== CARD ========== */
.card{
  background:var(--card);
  border-radius:var(--radius);
  border:1px solid #ffffff08;
  padding:16px;
  transition:border-color .5s;
}
.card-title{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:.95rem;font-weight:700;}
.card-title .ci{font-size:1.1rem;}
.card-title .cs{font-size:.7rem;color:var(--text-dim);font-weight:400;margin-left:3px;}

/* Content area — natural height, no forced min */
.card-content{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;}

/* Actions */
.card-actions{margin-top:14px;display:flex;flex-direction:column;gap:6px;}
.card-actions-sub{min-height:24px;display:flex;align-items:center;justify-content:center;}

.btn-primary{width:100%;font-family:inherit;font-weight:700;border:none;border-radius:14px;padding:14px;font-size:1.02rem;cursor:pointer;transition:transform .15s;color:#fff;}
.btn-primary:active{transform:scale(.96);}
.btn-primary.green{background:linear-gradient(135deg,var(--green),var(--green-dark));box-shadow:0 4px 16px #66bb6a25;}
.btn-primary.blue{background:linear-gradient(135deg,var(--blue),var(--blue-dark));box-shadow:0 4px 14px #42a5f525;}
.btn-primary.grey{background:linear-gradient(135deg,var(--grey),var(--grey-dark));box-shadow:none;}
.btn-primary:disabled{opacity:.4;cursor:default;transform:none;}
.btn-primary .xp{display:inline-block;background:#ffffff25;border-radius:8px;padding:2px 7px;margin-left:6px;font-size:.72rem;font-weight:400;}

.btn-sub{background:none;border:1px solid #ffffff20;color:var(--text-dim);padding:5px 14px;border-radius:8px;font-size:.72rem;font-family:inherit;cursor:pointer;}
.btn-link{background:none;border:none;color:var(--text-dim);font-size:.7rem;font-family:inherit;cursor:pointer;text-decoration:underline;}

/* Mini plant footer */
.mini-footer{margin-top:12px;padding-top:10px;border-top:1px solid #ffffff08;}
.mini-row{display:flex;align-items:center;gap:8px;}
.mini-plant{font-size:1.3rem;animation:sway 3s ease-in-out infinite;}
@keyframes sway{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(2deg);}}
.mini-info{flex:1;min-width:0;}
.mini-name{font-size:.7rem;color:var(--green-light);font-weight:700;}
.mini-name.blue{color:var(--blue-light);}
.mini-bar{height:4px;background:#ffffff10;border-radius:2px;margin-top:3px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:2px;transition:width .5s;}
.mini-bar-fill.green{background:linear-gradient(90deg,var(--green),var(--gold));}
.mini-bar-fill.blue{background:linear-gradient(90deg,var(--blue),var(--pink-light));}

/* ========== SIT ========== */
.sit-idle-icon{font-size:2.8rem;opacity:.55;}
.sit-idle-text{font-size:.9rem;color:var(--text-dim);line-height:1.5;}

.timer-num{font-family:'Fredoka',sans-serif;font-size:3.2rem;font-weight:700;letter-spacing:2px;line-height:1;transition:color .4s;}
.timer-num.c-dim{color:var(--text-dim);}
.timer-num.c-green{color:var(--green-light);}
.timer-num.c-yellow{color:var(--yellow);}
.timer-num.c-red{color:var(--red);animation:pulse 1s ease-in-out infinite;}
.timer-num.c-grey{color:var(--grey);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.timer-sub{font-size:.78rem;color:var(--text-dim);min-height:1.1em;}
.timer-sub.urgent{color:var(--accent2);}
.timer-sub.grey{color:var(--grey);}
.timer-progress{width:85%;max-width:260px;height:4px;background:#ffffff10;border-radius:2px;overflow:hidden;}
.timer-progress-fill{height:100%;border-radius:2px;transition:width 1s linear,background .5s;}

.thresh-pills{display:flex;gap:6px;justify-content:center;margin-top:4px;}
.tp{background:var(--card-alt);border:2px solid transparent;color:var(--text-dim);padding:4px 13px;border-radius:20px;font-size:.75rem;font-family:inherit;cursor:pointer;}
.tp.on{border-color:var(--green);color:var(--green);background:#66bb6a18;}

.card.sit-card.z-green{border-color:#66bb6a40;}
.card.sit-card.z-yellow{border-color:#ffca2860;}
.card.sit-card.z-red{border-color:#ef535060;}
.card.sit-card.z-grey{border-color:#78909c40;}

/* ========== WATER ========== */
.water-big{font-family:'Fredoka',sans-serif;font-size:2rem;font-weight:700;color:var(--blue-light);}
.water-ml{font-size:.75rem;color:var(--text-dim);}
.cups-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;width:100%;max-width:300px;margin:6px auto 0;}
.cup{aspect-ratio:.72;position:relative;border-radius:0 0 6px 6px;border:2px solid #ffffff20;border-top:none;background:var(--card-alt);overflow:hidden;transition:.3s;}
.cup::before{content:'';position:absolute;top:0;left:-2px;right:-2px;height:3px;background:#ffffff20;border-radius:2px 2px 0 0;}
.cup .water-fill{position:absolute;bottom:0;left:0;right:0;height:0%;background:linear-gradient(180deg,var(--blue-light),var(--blue));border-radius:0 0 5px 5px;transition:height .5s ease;}
.cup.filled{border-color:var(--blue);}
.cup.filled .water-fill{height:82%;}
.cup .cn{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:.55rem;color:#fff;font-weight:700;opacity:.6;z-index:1;}
.card.water-card{border-color:#42a5f520;}

/* ========== GARDEN ========== */
.garden-card .card-content{text-align:left;display:block;}
.dual-plants{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.plant-box{background:var(--card-alt);border-radius:12px;padding:14px 10px;text-align:center;}
.plant-box .pb-emoji{font-size:2.6rem;animation:sway 3s ease-in-out infinite;filter:drop-shadow(0 0 10px #66bb6a30);}
.plant-box .pb-ground{width:55%;height:10px;margin:-2px auto 0;background:linear-gradient(180deg,#3e2723,#5d4037);border-radius:50%;opacity:.5;}
.plant-box .pb-name{font-size:.85rem;font-weight:700;margin-top:6px;}
.plant-box.sit .pb-name{color:var(--green-light);}
.plant-box.water .pb-name{color:var(--blue-light);}
.plant-box .pb-stage{font-size:.68rem;color:var(--text-dim);margin-top:2px;}
.plant-box .pb-label{font-size:.65rem;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;}
.plant-box .pb-xp{display:flex;align-items:center;gap:6px;margin-top:6px;}
.plant-box .pb-bar{flex:1;height:5px;background:#ffffff10;border-radius:3px;overflow:hidden;}
.plant-box .pb-bar-fill{height:100%;border-radius:3px;transition:width .5s;}
.plant-box.sit .pb-bar-fill{background:linear-gradient(90deg,var(--green),var(--gold));}
.plant-box.water .pb-bar-fill{background:linear-gradient(90deg,var(--blue),var(--pink-light));}
.plant-box .pb-xp-text{font-size:.6rem;color:var(--text-dim);min-width:30px;text-align:right;}

.garden-grid-title{font-size:.82rem;color:var(--text-dim);margin-bottom:8px;text-align:center;}
.garden-area{min-height:90px;background:linear-gradient(180deg,#1b2f1b 0%,#2a3f2a 60%,#3e2723 85%,#5d4037 100%);border-radius:12px;padding:12px;display:flex;flex-wrap:wrap;gap:5px;align-items:flex-end;justify-content:center;}
.ga-tree{font-size:1.7rem;animation:gsway 4s ease-in-out infinite;transition:transform .2s;}
.ga-tree.water{filter:drop-shadow(0 0 4px #42a5f540);}
.ga-tree.sit{filter:drop-shadow(0 0 4px #66bb6a40);}
@keyframes gsway{0%,100%{transform:rotate(-1deg);}50%{transform:rotate(1deg);}}
.ga-empty{width:100%;text-align:center;font-size:.8rem;color:var(--text-dim);padding:14px 0;}
.ga-count{text-align:center;font-size:.7rem;color:var(--text-dim);margin-top:6px;}
.ga-count span{color:var(--gold);font-weight:700;}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid #ffffff08;}
.stat{text-align:center;}
.stat-v{font-family:'Fredoka',sans-serif;font-size:1.15rem;font-weight:700;color:var(--gold);}
.stat-l{font-size:.58rem;color:var(--text-dim);margin-top:1px;}

.rest-row{margin-top:12px;text-align:center;}
.rest-btn{background:var(--card-alt);border:1px solid #ffffff15;color:var(--text-dim);padding:6px 16px;border-radius:10px;font-size:.72rem;font-family:inherit;cursor:pointer;}

/* ========== HISTORY ========== */
.hist-section{margin-top:18px;padding-top:14px;border-top:1px solid #ffffff08;}
.hist-header{font-size:.85rem;color:var(--text-dim);margin-bottom:10px;text-align:center;}
.hist-tabs{display:flex;background:var(--card-alt);border-radius:10px;padding:3px;gap:2px;margin-bottom:12px;}
.htab{flex:1;padding:7px 0;text-align:center;font-size:.8rem;color:var(--text-dim);cursor:pointer;border-radius:8px;transition:all .2s;font-weight:700;}
.htab.active{background:var(--green-dark);color:#fff;}
.hist-body{font-size:.78rem;}
.hist-summary{display:flex;flex-direction:column;gap:8px;padding:12px;background:var(--card-alt);border-radius:10px;margin-bottom:12px;}
.hs-row{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;}
.hs-icon{font-size:.9rem;flex-shrink:0;}
.hs-val{font-family:'Fredoka',sans-serif;font-weight:700;font-size:.95rem;color:var(--text);}
.hs-sub{color:var(--text-dim);font-size:.72rem;}
.hs-avg{color:var(--gold);font-size:.72rem;margin-left:auto;}
.hs-val.ok{color:var(--green-light);}
.hs-val.bad{color:var(--red);}
.hs-val.info{color:var(--text);}

.hist-list-title{font-size:.72rem;color:var(--text-dim);margin:6px 0 6px;text-align:center;}
.hist-list{display:flex;flex-direction:column;gap:4px;}
.hist-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card-alt);border-radius:8px;font-size:.72rem;}
.hist-row .hr-date{color:var(--text-dim);min-width:48px;font-weight:700;}
.hist-row .hr-item{display:flex;align-items:center;gap:2px;white-space:nowrap;}
.hist-row .hr-item .hr-v{font-family:'Fredoka',sans-serif;font-weight:700;}
.hist-row .hr-v.ok{color:var(--green-light);}
.hist-row .hr-v.bad{color:var(--red);}
.hist-row .hr-v.info{color:var(--text);}
.hist-row .hr-v.over{color:var(--red);}
.hist-row .hr-rest{color:var(--grey);font-style:italic;}
.hist-empty{text-align:center;color:var(--text-dim);font-size:.78rem;padding:16px 0;}

/* ========== OVERLAY ========== */
.overlay{position:fixed;inset:0;background:#0c1810ee;z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(10px);}
.overlay.show{display:flex;}
.ov-card{background:var(--card);border-radius:20px;padding:24px 20px;max-width:340px;width:100%;text-align:center;border:2px solid var(--green);animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{0%{transform:scale(.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
.ov-card h2{font-size:1.18rem;margin-bottom:3px;color:var(--accent2);}
.ov-card .big-emoji{font-size:2.6rem;margin-bottom:6px;animation:bounce .6s ease infinite alternate;}
@keyframes bounce{0%{transform:translateY(0);}100%{transform:translateY(-8px);}}
.spinner-area{margin:12px 0;position:relative;height:62px;overflow:hidden;background:var(--card-alt);border-radius:12px;border:2px solid var(--green-dark);display:none;}
.spinner-area.show{display:block;}
.spinner-track{display:flex;flex-direction:column;}
.spinner-item{height:62px;display:flex;align-items:center;justify-content:center;gap:8px;padding:0 14px;}
.spinner-item .s-icon{font-size:1.5rem;flex-shrink:0;}
.spinner-item .s-text{font-size:.85rem;text-align:left;line-height:1.3;}
.sp-ptr{position:absolute;top:50%;transform:translateY(-50%);border-top:9px solid transparent;border-bottom:9px solid transparent;}
.sp-ptr.l{left:-2px;border-left:10px solid var(--gold);}
.sp-ptr.r{right:-2px;border-right:10px solid var(--gold);}
.result-box{margin-top:8px;padding:12px;background:var(--card-alt);border-radius:12px;display:none;animation:pop .3s ease;}
.result-box.show{display:block;}
.result-box .r-icon{font-size:1.6rem;}
.result-box .r-text{font-size:.9rem;margin-top:4px;line-height:1.4;}
.pro-msg{margin:10px 0;padding:10px;background:#66bb6a18;border-radius:10px;border:1px solid #66bb6a30;display:none;animation:pop .3s ease;}
.pro-msg.show{display:block;}
.pro-msg .pm-text{font-size:.88rem;line-height:1.5;color:var(--green-light);}
.reward-line{margin-top:6px;font-size:.75rem;color:var(--gold);display:none;}
.reward-line.show{display:block;}
.xp-earned{display:inline-block;background:var(--gold);color:#333;border-radius:8px;padding:2px 10px;font-weight:700;font-size:.8rem;margin-top:6px;}
.ov-done{margin-top:12px;width:100%;background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff;font-family:inherit;font-weight:700;border:none;border-radius:14px;padding:11px;font-size:.93rem;cursor:pointer;}
.ov-done:active{transform:scale(.96);}

/* ========== DESKTOP ========== */
@media(min-width:768px){
  body{font-size:17px;}
  .tabs{display:none;}
  .main{padding-bottom:30px;}
  .views{max-width:1000px;margin:0 auto;padding:16px 20px 40px;display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:stretch;}
  .view{display:flex!important;}
  .view.garden-view{grid-column:1/3;}
  .view>.card{width:100%;display:flex;flex-direction:column;}
  .timer-num{font-size:3rem;}
  /* Make sit and water card content natural height — actions push to bottom in same cards */
  .card-actions{margin-top:auto;padding-top:14px;}
  .sit-card,.water-card{display:flex;flex-direction:column;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="tb-title">🌱 起來動一動</div>
  <div class="tb-chip"><span>🪑</span><span class="v off" id="tbTimer">--:--</span></div>
  <div class="tb-chip"><span>站</span><span class="v" id="tbStand">0/5</span></div>
  <div class="tb-chip"><span>💧</span><span class="v" id="tbWater">0/8</span></div>
  <button class="tb-btn" id="notifBtn" onclick="askNotif()" title="開啟通知">🔔<span class="notif-dot" id="notifDot"></span></button>
  <button class="tb-btn" id="soundToggle">🔊</button>
  <button class="tb-login" id="loginBtn" onclick="handleLogin()"><span class="dot off"></span>登入</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="views">

    <!-- SIT VIEW -->
    <div class="view active" id="viewSit">
      <div class="card sit-card" id="sitCard">
        <div class="card-title">
          <span class="ci">🪑</span>
          <span>久坐追蹤</span>
          <span class="cs" id="sitSubtitle"></span>
        </div>
        <div class="card-content">
          <div id="sitIdle" style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:10px 0;">
            <div class="sit-idle-icon">💺</div>
            <div class="sit-idle-text">準備坐下工作了嗎？<br>按下開始，我幫你追蹤</div>
          </div>
          <div id="sitActive" style="display:none;flex-direction:column;align-items:center;gap:10px;width:100%;">
            <div class="timer-num c-dim" id="sitDisp">00:00</div>
            <div class="timer-sub" id="sitHint">剛坐下，還不用擔心 😌</div>
            <div class="timer-progress"><div class="timer-progress-fill" id="sitBarFill"></div></div>
            <div class="thresh-pills">
              <button class="tp" data-m="20" onclick="pickThresh(20)">20分</button>
              <button class="tp on" data-m="30" onclick="pickThresh(30)">30分</button>
              <button class="tp" data-m="45" onclick="pickThresh(45)">45分</button>
            </div>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn-primary green" id="sitIdleBtn" onclick="startSession()">▶ 開始工作</button>
          <button class="btn-primary green" id="standBtn" onclick="handleStandup()" style="display:none">🧍 我站起來了<span class="xp" id="sitBadge"></span></button>
          <div class="card-actions-sub">
            <button class="btn-sub" id="sitEndBtn" onclick="endSession()" style="display:none">⏹ 結束工作</button>
          </div>
        </div>
        <div class="mini-footer" id="mini1"></div>
      </div>
    </div>

    <!-- WATER VIEW -->
    <div class="view" id="viewWater">
      <div class="card water-card">
        <div class="card-title">
          <span class="ci">💧</span>
          <span>喝水追蹤</span>
          <span class="cs">（每 2 小時提醒）</span>
        </div>
        <div class="card-content">
          <div class="water-big"><span id="wNum">0</span> / 12 杯</div>
          <div class="water-ml" id="wMl">≈ 0 ml</div>
          <div class="cups-grid" id="cupsGrid"></div>
        </div>
        <div class="card-actions">
          <button class="btn-primary blue" id="waterBtn" onclick="drinkWater()">💧 喝了一杯<span class="xp">+0.5 XP</span></button>
          <div class="card-actions-sub">
            <button class="btn-link" id="undoBtn" onclick="undoWater()" style="display:none">↩ 按錯了</button>
          </div>
        </div>
        <div class="mini-footer" id="mini2"></div>
      </div>
    </div>

    <!-- GARDEN VIEW -->
    <div class="view garden-view" id="viewGarden">
      <div class="card garden-card">
        <div class="card-title">
          <span class="ci">🌱</span>
          <span>植物 & 植物園</span>
        </div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

async function cloudSave(){if(!dbRef)return;try{await set(dbRef,{...S});}catch(e){}}

// Pull from cloud — merge cloud state intelligently
// firstPull=true means this is right after login; normal case is visibility/tab switch
async function cloudPull(firstPull){
  if(!dbRef)return;
  try{
    const snap=await get(dbRef);
    if(!snap.exists()){if(firstPull)await cloudSave();return;}
    const c=snap.val();
    const today=new Date().toDateString();
    // If cloud data is from a previous day, don't use it
    if(c.lastDate&&c.lastDate!==today&&c.lastDate!==null){
      if(firstPull)await cloudSave();
      return;
    }
    // Migrate garden format
    if(!Array.isArray(c.garden))c.garden=[];
    c.garden=c.garden.map(g=>typeof g==='string'?{type:'sit',emoji:g}:g);

    // Decide whether to apply cloud data
    // Rule: if cloud has a more recent sit/session activity, use cloud
    // Otherwise, keep local
    const cloudNewer=isCloudNewer(c);
    if(cloudNewer||firstPull){
      const wasInSession=S.inSession;
      Object.assign(S,c);
      saveLocal();
      // If session state changed, update UI
      if(S.inSession&&!wasInSession){
        // Cloud says we're in session but local didn't know — resume it
        resumeSessionIfNeeded();
      }else if(!S.inSession&&wasInSession){
        // Cloud ended session while we thought we were in — sync UI
        if(tid){clearInterval(tid);tid=null;}
        applySessionUI(false);
      }
      renderAll();
    }
  }catch(e){console.log('cloudPull err',e);}
}

// Heuristic: is cloud data newer than local?
// Compare session start times, counters, and total activity
function isCloudNewer(c){
  // If cloud has active session but local doesn't → cloud newer
  if(c.inSession&&!S.inSession)return true;
  // If local has active session but cloud doesn't → local newer
  if(S.inSession&&!c.inSession)return false;
  // Both in session: compare sitStartAt (newer = more recent activity)
  if(c.inSession&&S.inSession){
    return (c.sitStartAt||0)>(S.sitStartAt||0);
  }
  // Neither in session: compare total activity (standUps + waterCount)
  const cloudTotal=(c.todayStand||0)+(c.todayWater||0)+(c.garden?.length||0);
  const localTotal=(S.todayStand||0)+(S.todayWater||0)+(S.garden?.length||0);
  return cloudTotal>localTotal;
}

];
const PRO=['主動站起來，太棒了！💚','還沒到提醒就站起來，自律滿分！','好習慣養成中 🌟','雙倍經驗，聰明！','腰椎和屁股都在微笑 😊','MVP 就是你！'];

// Two plant series
const SIT_STG=[
  {e:'🌱',n:'種子',x:3},{e:'🌿',n:'嫩芽',x:4},{e:'☘️',n:'幼苗',x:5},{e:'🪴',n:'盆栽',x:5},
  {e:'🎋',n:'竹苗',x:6},{e:'🌴',n:'棕櫚',x:6},{e:'🌳',n:'大樹',x:7},{e:'🌸',n:'完成',x:0}
];

  {e:'🌱',n:'種子',x:4},{e:'🌿',n:'嫩葉',x:5},{e:'🌾',n:'小草',x:6},{e:'🪴',n:'小花盆',x:6},
  {e:'🌱',n:'花苗',x:7},{e:'🌷',n:'花苞',x:8},{e:'🌺',n:'盛開',x:8},{e:'🌸',n:'完成',x:0}
];
// Final forms when tree moves to garden
const SIT_TREES=['🌳','🌲','🎄','🌴','🎋','🍀','🍁','🎍'];
const WATER_PLANTS=['🌸','🌻','🌺','🪷','🌷','🌹','🌼','🪻'];

// ===== STATE =====
window.S=loadL();
function defS(){return{thresh:30,todayStand:0,todayWater:0,streak:0,lastDate:null,
  sitStageIdx:0,sitStageXP:0,waterStageIdx:0,waterStageXP:0,
  garden:[],soundOn:true,totalStands:0,totalWater:0,restToday:false,
  sessionSecTotal:0,longestSit:0,sessionsToday:0,history:[],
  inSession:false,sitStartAt:0,sessionStartAt:0,sessionAccum:0,lastWaterRemindAt:0,alerted:false}}
function loadL(){
  try{
    const d=JSON.parse(localStorage.getItem('health12'));
    if(d){
      const today=new Date().toDateString();
      if(d.lastDate&&d.lastDate!==today){
        // Snapshot yesterday's data into history before reset
        if(!Array.isArray(d.history))d.history=[];
        // Only snapshot if there was any meaningful activity (or it was a rest day)
        if(d.todayStand>0||d.todayWater>0||d.sessionSecTotal>0||d.restToday){
          const LONGEST_THRESHOLD=45*60; // 45 min in seconds
          d.history.push({
            date:d.lastDate,
            water:d.todayWater||0,
            waterMl:(d.todayWater||0)*ML,
            stands:d.todayStand||0,
            sessions:d.sessionsToday||0,
            workTimeSec:d.sessionSecTotal||0,
            longestSitSec:d.longestSit||0,
            rested:d.restToday||false,
            overLongSit:(d.longestSit||0)>=LONGEST_THRESHOLD
          });
        }
        const diff=Math.floor((new Date(today)-new Date(d.lastDate))/864e5);
        if(diff===1){if((d.todayStand>=S_GOAL&&d.todayWater>=W_STREAK)||d.restToday)d.streak=(d.streak||0)+1;else d.streak=0;}
        else if(diff>1)d.streak=0;
        d.todayStand=0;d.todayWater=0;d.lastDate=today;d.restToday=false;d.sessionSecTotal=0;d.longestSit=0;d.sessionsToday=0;
        d.inSession=false;d.sitStartAt=0;d.sessionStartAt=0;d.sessionAccum=0;d.alerted=false;
      }
      if(!Array.isArray(d.garden))d.garden=[];
      if(!Array.isArray(d.history))d.history=[];
      // Migrate old garden items (strings → objects)
      d.garden=d.garden.map(g=>typeof g==='string'?{type:'sit',emoji:g}:g);
      ['sitStageIdx','sitStageXP','waterStageIdx','waterStageXP','todayWater','totalStands','totalWater','sessionSecTotal','longestSit','sessionsToday'].forEach(k=>{if(!d[k])d[k]=0;});
      if(!d.thresh)d.thresh=30;
      return d;
    }
  }catch(e){}
  return defS();
}
function saveLocal(){localStorage.setItem('health12',JSON.stringify(S));}
function saveSync(){saveLocal();cloudSave();}

// ===== TABS =====
const views=document.querySelectorAll('.view');
const tabs=document.querySelectorAll('.tab');
window.switchTab=function(i){
  views.forEach((v,j)=>v.classList.toggle('active',i===j));
  tabs.forEach((t,j)=>t.classList.toggle('active',i===j));
};

// ===== TIMING (session state now stored in S for cross-device sync) =====
// S.inSession, S.sitStartAt, S.sessionStartAt, S.sessionAccum, S.lastWaterRemindAt, S.alerted
let tid=null;
const now=()=>Date.now();
const sitE=()=>S.inSession&&S.sitStartAt?Math.floor((now()-S.sitStartAt)/1000):0;
const sessE=()=>S.inSession&&S.sessionStartAt?Math.floor((now()-S.sessionStartAt)/1000):0;
const totalSS=()=>(S.sessionAccum||0)+sessE();
function zone(s){const t=S.thresh*60;return s<SILENT?'silent':s<t?'active':s<AWAY?'reminded':'away';}

function tick(){
  if(!S.inSession)return;
  const e=sitE(),t=S.thresh*60;
  if(e>S.longestSit)S.longestSit=e;
  S.sessionSecTotal=(S.sessionAccum||0)+sessE();
  if(!S.alerted&&e>=t){S.alerted=true;if(S.soundOn)playChime();fireNotif('坐太久了！站起來！');}
  if(S.lastWaterRemindAt&&(now()-S.lastWaterRemindAt)>=W_INT*1000){S.lastWaterRemindAt=now();if(S.soundOn)playDrop();fireNotif('💧 該喝水了！');}
  updSit(e);updTop(e);
  if(e%30===0)saveLocal();
}

window.startSession=function(){
  const n=now();
  S.inSession=true;S.sitStartAt=n;S.sessionStartAt=n;S.sessionAccum=S.sessionSecTotal||0;
  S.lastWaterRemindAt=n;S.alerted=false;
  S.sessionsToday=(S.sessionsToday||0)+1;
  applySessionUI(true);
  if(tid)clearInterval(tid);tid=setInterval(tick,1000);tick();saveSync();
};
window.endSession=function(){
  if(!S.inSession)return;
  S.sessionSecTotal=(S.sessionAccum||0)+sessE();
  S.inSession=false;
  S.sitStartAt=0;S.sessionStartAt=0;S.alerted=false;
  if(tid){clearInterval(tid);tid=null;}
  applySessionUI(false);
  saveSync();updTop(0);renderAll();
};
function resetSit(){S.sitStartAt=now();S.alerted=false;}

// Apply session UI (used by start, end, and sync-from-cloud recovery)
function applySessionUI(active){
  document.getElementById('sitIdle').style.display=active?'none':'flex';
  document.getElementById('sitActive').style.display=active?'flex':'none';
  document.getElementById('sitIdleBtn').style.display=active?'none':'block';
  document.getElementById('standBtn').style.display=active?'block':'none';
  document.getElementById('sitEndBtn').style.display=active?'inline-block':'none';
  document.getElementById('sitSubtitle').textContent=active?'（工作中）':'';
  document.getElementById('tabSitBadge').textContent=active?'工作中':'';
}

// Resume session from loaded state (after login pulls cloud, or on page load with local data)
function resumeSessionIfNeeded(){
  if(S.inSession&&S.sitStartAt){
    // Session still active — check if sitStartAt is too old (> 6 hours means stale)
    const ageMin=(now()-S.sitStartAt)/60000;
    if(ageMin>360){
      // Too old, treat as stale — end session silently
      S.inSession=false;S.sitStartAt=0;S.sessionStartAt=0;S.alerted=false;
      applySessionUI(false);
      saveLocal();
      return;
    }
    applySessionUI(true);
    if(tid)clearInterval(tid);
    tid=setInterval(tick,1000);
    tick();
  }else{
    applySessionUI(false);
  }
}
let lastPullAt=0;
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){
    if(S.inSession)tick();
    // Pull cloud only if it's been > 10s since last pull (avoid spamming)
    if(now()-lastPullAt>10000){
      lastPullAt=now();
      cloudPull();
    }
  }
});

function updSit(e){
  const m=Math.floor(e/60),s=e%60,d=document.getElementById('sitDisp');
  d.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const z=zone(e),card=document.getElementById('sitCard'),hint=document.getElementById('sitHint'),fill=document.getElementById('sitBarFill'),badge=document.getElementById('sitBadge'),btn=document.getElementById('standBtn');
  const t=S.thresh*60,r=Math.min(e/t,1);
  fill.style.width=(r*100)+'%';
  btn.className='btn-primary green';
  card.className='card sit-card';
  if(z==='silent'){d.className='timer-num c-dim';fill.style.background='var(--text-dim)';hint.textContent='剛坐下，還不用擔心 😌';hint.className='timer-sub';badge.textContent='';}
  else if(z==='active'){const a=(e-SILENT)/(t-SILENT);if(a<.7){d.className='timer-num c-green';card.className='card sit-card z-green';fill.style.background='var(--green)';hint.textContent='狀態良好 🟢';}else{d.className='timer-num c-yellow';card.className='card sit-card z-yellow';fill.style.background='var(--yellow)';hint.textContent='快到了，考慮站起來？🟡';}hint.className='timer-sub';badge.textContent='+2 XP';}
  else if(z==='reminded'){d.className='timer-num c-red';card.className='card sit-card z-red';fill.style.background='var(--red)';hint.textContent='坐太久了！站起來吧！🔴';hint.className='timer-sub urgent';badge.textContent='+1 XP';}
  else{d.className='timer-num c-grey';card.className='card sit-card z-grey';fill.style.background='var(--grey)';hint.textContent='超過 60 分鐘，你可能已經離開了 🫥';hint.className='timer-sub grey';badge.textContent='重設';btn.className='btn-primary grey';}
}
window.pickThresh=function(m){S.thresh=m;saveSync();document.querySelectorAll('.tp').forEach(b=>b.classList.toggle('on',+b.dataset.m===m));if(S.inSession){S.alerted=false;tick();}};

window.handleStandup=function(){
  if(!S.inSession)return;
  const e=sitE(),z=zone(e);
  if(z==='silent'||z==='away'){resetSit();if(z==='away')showAway();else tick();saveSync();return;}
  const xp=z==='active'?2:1,tree=applySitXP(xp);
  S.todayStand++;S.totalStands++;S.lastDate=new Date().toDateString();
  // Reset sit timer immediately so cloud reflects the reset state for cross-device sync
  resetSit();
  saveSync();showStandOv(z==='active',xp,tree);renderAll();
};
window.drinkWater=function(){

  S.lastDate=new Date().toDateString();
  if(S.inSession)S.lastWaterRemindAt=now();
  saveSync();renderAll();
  const u=document.getElementById('undoBtn');u.style.display='inline';setTimeout(()=>u.style.display='none',5000);
};
window.undoWater=function(){
  if(S.todayWater<=0)return;
  S.todayWater--;S.totalWater=Math.max(0,S.totalWater-1);
  S.waterStageXP=Math.max(0,S.waterStageXP-0.5);
  saveSync();renderAll();document.getElementById('undoBtn').style.display='none';
};

// Apply XP for sit plant series
function applySitXP(xp){
  S.sitStageXP+=xp;let treeObj=null;
  while(true){
    const st=SIT_STG[S.sitStageIdx];
    if(st.x===0){
      const emoji=SIT_TREES[Math.floor(Math.random()*SIT_TREES.length)];
      treeObj={type:'sit',emoji};
      S.garden.push(treeObj);
      S.sitStageIdx=0;S.sitStageXP=0;
      break;
    }
    if(S.sitStageXP>=st.x){
      S.sitStageXP-=st.x;S.sitStageIdx++;
      if(S.sitStageIdx>=SIT_STG.length-1){
        const emoji=SIT_TREES[Math.floor(Math.random()*SIT_TREES.length)];
        treeObj={type:'sit',emoji};
        S.garden.push(treeObj);
        S.sitStageIdx=0;S.sitStageXP=0;
        break;
      }
    }else break;
  }
  return treeObj;
}
// Apply XP for water plant series
function applyWaterXP(xp){
  S.waterStageXP+=xp;let plantObj=null;
  while(true){
    const st=WATER_STG[S.waterStageIdx];
    if(st.x===0){
      const emoji=WATER_PLANTS[Math.floor(Math.random()*WATER_PLANTS.length)];
      plantObj={type:'water',emoji};
      S.garden.push(plantObj);
      S.waterStageIdx=0;S.waterStageXP=0;
      break;
    }
    if(S.waterStageXP>=st.x){
      S.waterStageXP-=st.x;S.waterStageIdx++;
      if(S.waterStageIdx>=WATER_STG.length-1){
        const emoji=WATER_PLANTS[Math.floor(Math.random()*WATER_PLANTS.length)];
        plantObj={type:'water',emoji};
        S.garden.push(plantObj);
        S.waterStageIdx=0;S.waterStageXP=0;
        break;
      }
    }else break;
  }
  return plantObj;
}

// ===== HISTORY =====
const LONGEST_WARN_SEC=45*60; // 45min threshold for "over long sit"
let currentHist='day';

window.switchHist=function(range){
  currentHist=range;
  document.querySelectorAll('.htab').forEach(t=>t.classList.toggle('active',t.dataset.range===range));

// Build "today" synthetic record from current state (for comparisons / week / month totals)
function todaySnapshot(){
  return {
    date:S.lastDate||new Date().toDateString(),
    water:S.todayWater||0,
    waterMl:(S.todayWater||0)*ML,
    stands:S.todayStand||0,
    sessions:S.sessionsToday||0,
    workTimeSec:(S.sessionAccum||0)+(S.inSession?Math.floor((Date.now()-(S.sessionStartAt||Date.now()))/1000):0),
    longestSitSec:S.longestSit||0,
    rested:S.restToday||false,
    overLongSit:(S.longestSit||0)>=LONGEST_WARN_SEC
  };
}

// Calculate aggregate stats over a set of day records. Excludes rest days from workday count.
function aggregate(records){
  const workdays=records.filter(r=>!r.rested);
  const n=workdays.length||1;
  const sum=(k)=>workdays.reduce((a,r)=>a+(r[k]||0),0);
  const overLongCount=workdays.filter(r=>r.overLongSit).length;
  return {
    count:workdays.length,
    totalWater:sum('water'),
    totalWaterMl:sum('waterMl'),
    totalStands:sum('stands'),
    totalWorkSec:sum('workTimeSec'),
    totalSessions:sum('sessions'),
    avgWater:sum('water')/n,
    avgWaterMl:sum('waterMl')/n,
    avgStands:sum('stands')/n,
    avgWorkSec:sum('workTimeSec')/n,
    avgLongestSec:sum('longestSitSec')/n,
    overLongCount
  };
}

// Filter history records within last N days (based on date string comparison)
function recentNDays(n){
  const all=[...(S.history||[])];
  // Add today if it has any activity
  const today=todaySnapshot();
  if(today.water>0||today.stands>0||today.workTimeSec>0||today.rested)all.push(today);
  // Sort newest first
  all.sort((a,b)=>new Date(b.date)-new Date(a.date));
  // Filter by age
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-n);
  return all.filter(r=>new Date(r.date)>=cutoff);
}

function allDays(){
  const all=[...(S.history||[])];
  const today=todaySnapshot();
  if(today.water>0||today.stands>0||today.workTimeSec>0||today.rested)all.push(today);
  all.sort((a,b)=>new Date(b.date)-new Date(a.date));
  return all;
}

function fmtDate(s){
  const d=new Date(s);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function fmtHr(sec){
  if(sec<60)return sec+'s';
  const m=Math.round(sec/60);
  if(m<60)return m+'m';
  const h=Math.floor(m/60),r=m%60;
  return r?`${h}h${r}m`:`${h}h`;
}

// Color class helper for water/stand/longestSit
function colorCls(type,val){
  if(type==='water')return val>=W_STREAK?'ok':'bad';
  if(type==='stand')return val>=S_GOAL?'ok':'bad';
  if(type==='longest')return val>=LONGEST_WARN_SEC?'over':'ok';
  return 'info';
}

function renderHistory(){
  const body=document.getElementById('histBody');
  if(!body)return;
  if(currentHist==='day')body.innerHTML=renderDayView();
  else if(currentHist==='week')body.innerHTML=renderRangeView(7,'最近 7 天');
  else if(currentHist==='month')body.innerHTML=renderRangeView(30,'最近 30 天');
  else body.innerHTML=renderAllView();
}

function renderDayView(){
  const today=todaySnapshot();
  // Use all history (workdays) for the "平均" comparison
  const allData=aggregate(allDays());
  const wCls=colorCls('water',today.water);
  const sCls=colorCls('stand',today.stands);
  const lCls=colorCls('longest',today.longestSitSec);
  if(today.water===0&&today.stands===0&&today.workTimeSec===0&&!today.rested){
    return `<div class="hist-empty">今天還沒開始記錄</div>`;
  }
  if(today.rested){
    return `<div class="hist-summary">
      <div class="hs-row"><span class="hs-icon">😴</span><span class="hs-val">休息日</span></div>
    </div>`;
  }
  const avgLine=allData.count>0?`(歷史平均 ${allData.avgWater.toFixed(1)} 杯 / ${Math.round(allData.avgWaterMl)} ml)`:'';
  const avgLineS=allData.count>0?`(歷史平均 ${allData.avgStands.toFixed(1)} 次)`:'';
  const avgLineW=allData.count>0?`(歷史平均 ${fmtHr(Math.round(allData.avgWorkSec))})`:'';
  const avgLineL=allData.count>0?`(歷史平均 ${fmtHr(Math.round(allData.avgLongestSec))})`:'';
  return `<div class="hist-summary">
    <div class="hs-row"><span class="hs-icon">💧</span><span class="hs-val ${wCls}">${today.water} 杯 (${today.waterMl} ml)</span><span class="hs-avg">${avgLine}</span></div>
    <div class="hs-row"><span class="hs-icon">🪑</span><span class="hs-val ${sCls}">${today.stands} 次</span><span class="hs-avg">${avgLineS}</span></div>
    <div class="hs-row"><span class="hs-icon">⏱️</span><span class="hs-val info">${fmtHr(today.workTimeSec)}</span><span class="hs-sub">${today.sessions} session</span><span class="hs-avg">${avgLineW}</span></div>
    <div class="hs-row"><span class="hs-icon">📌</span><span class="hs-val ${lCls}">最長 ${fmtHr(today.longestSitSec)}</span>${today.overLongSit?'<span class="hs-sub">⚠️ 超標</span>':''}<span class="hs-avg">${avgLineL}</span></div>
  </div>`;
}

function renderRangeView(days,label){
  const records=recentNDays(days);
  if(records.length===0){
    return `<div class="hist-empty">${label}還沒有紀錄</div>`;
  }
  const agg=aggregate(records);
  const gardenAdd=(S.garden||[]).length; // Total — we don't store garden per day; show total
  const summary=`<div class="hist-summary">
    <div class="hs-row"><span class="hs-icon">💧</span><span class="hs-val">${agg.totalWater} 杯 (${agg.totalWaterMl} ml)</span><span class="hs-avg">(平均 ${agg.avgWater.toFixed(1)} 杯 / ${Math.round(agg.avgWaterMl)} ml)</span></div>
    <div class="hs-row"><span class="hs-icon">🪑</span><span class="hs-val">${agg.totalStands} 次</span><span class="hs-avg">(平均 ${agg.avgStands.toFixed(1)} 次)</span></div>
    <div class="hs-row"><span class="hs-icon">⏱️</span><span class="hs-val">${fmtHr(agg.totalWorkSec)}</span><span class="hs-sub">${agg.totalSessions} sessions</span><span class="hs-avg">(平均 ${fmtHr(Math.round(agg.avgWorkSec))})</span></div>
    <div class="hs-row"><span class="hs-icon">📌</span><span class="hs-val ${agg.overLongCount>0?'bad':'ok'}">超標 ${agg.overLongCount} 次</span><span class="hs-sub">(≥ 45 min)</span><span class="hs-avg">(平均 ${fmtHr(Math.round(agg.avgLongestSec))})</span></div>
    <div class="hs-row"><span class="hs-icon">📅</span><span class="hs-val">${agg.count} 個工作日</span></div>
  </div>`;
  const list=renderDailyList(records);
  return `<div class="hist-list-title">📅 ${label}累計</div>${summary}<div class="hist-list-title">每日明細</div>${list}`;
}

function renderAllView(){
  const records=allDays();
  if(records.length===0){
    return `<div class="hist-empty">還沒有紀錄</div>`;
  }
  const agg=aggregate(records);
  const gardenTotal=(S.garden||[]).length;
  const summary=`<div class="hist-summary">
    <div class="hs-row"><span class="hs-icon">💧</span><span class="hs-val">${agg.totalWater} 杯 (${agg.totalWaterMl} ml)</span><span class="hs-avg">(平均 ${agg.avgWater.toFixed(1)} 杯 / ${Math.round(agg.avgWaterMl)} ml)</span></div>
    <div class="hs-row"><span class="hs-icon">🪑</span><span class="hs-val">${agg.totalStands} 次</span><span class="hs-avg">(平均 ${agg.avgStands.toFixed(1)} 次)</span></div>
    <div class="hs-row"><span class="hs-icon">⏱️</span><span class="hs-val">${fmtHr(agg.totalWorkSec)}</span><span class="hs-sub">${agg.totalSessions} sessions</span><span class="hs-avg">(平均 ${fmtHr(Math.round(agg.avgWorkSec))})</span></div>
    <div class="hs-row"><span class="hs-icon">📌</span><span class="hs-val ${agg.overLongCount>0?'bad':'ok'}">超標 ${agg.overLongCount} 次</span><span class="hs-sub">(≥ 45 min)</span><span class="hs-avg">(平均 ${fmtHr(Math.round(agg.avgLongestSec))})</span></div>
    <div class="hs-row"><span class="hs-icon">🌳</span><span class="hs-val">植物園 ${gardenTotal} 棵</span></div>
    <div class="hs-row"><span class="hs-icon">📅</span><span class="hs-val">${agg.count} 個工作日</span></div>
  </div>`;
  return `<div class="hist-list-title">📊 總累計</div>${summary}`;
}

function renderDailyList(records){
  if(records.length===0)return '<div class="hist-empty">沒有資料</div>';
  return `<div class="hist-list">${records.map(r=>{
    if(r.rested){
      return `<div class="hist-row"><span class="hr-date">${fmtDate(r.date)}</span><span class="hr-rest">😴 休息日</span></div>`;
    }
    const wCls=colorCls('water',r.water);
    const sCls=colorCls('stand',r.stands);
    const lCls=colorCls('longest',r.longestSitSec);
    return `<div class="hist-row">
      <span class="hr-date">${fmtDate(r.date)}</span>
      <span class="hr-item">💧<span class="hr-v ${wCls}">${r.water}</span><span class="hs-sub">(${r.waterMl})</span></span>
      <span class="hr-item">🪑<span class="hr-v ${sCls}">${r.stands}</span></span>
      <span class="hr-item">⏱️<span class="hr-v info">${fmtHr(r.workTimeSec)}</span></span>
      <span class="hr-item">📌<span class="hr-v ${lCls}">${fmtHr(r.longestSitSec)}</span>${r.overLongSit?'⚠️':''}</span>
    </div>`;
  }).join('')}</div>`;
}

}

function updTop(e){
  const tb=document.getElementById('tbTimer');
  if(!S.inSession){tb.textContent='--:--';tb.className='v off';}
  else{const m=Math.floor(e/60),s=e%60;tb.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;const z=zone(e);tb.className='v '+(z==='silent'?'off':z==='active'?'on':z==='reminded'?'warn':'off');}
  const ts=document.getElementById('tbStand');ts.textContent=`${S.todayStand}/${S_GOAL}`;ts.className='v'+(S.todayStand>=S_GOAL?' done':'');
  const tw=document.getElementById('tbWater');tw.textContent=`${S.todayWater}/${W_STREAK}`;tw.className='v'+(S.todayWater>=W_STREAK?' done':'');
}

function playDrop(){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(1200,c.currentTime);o.frequency.exponentialRampToValueAtTime(400,c.currentTime+.15);g.gain.setValueAtTime(.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+.3);}catch(e){}}
